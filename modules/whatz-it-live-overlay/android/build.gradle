buildscript {
  repositories {
    google()
    mavenCentral()
  }

  dependencies {
    classpath "com.android.tools.build:gradle:9.2.1"
  }
}

def reactNativeArchitectures() {
  def value = rootProject.getProperties().get("reactNativeArchitectures")
  return value ? value.split(",") : ["armeabi-v7a", "x86", "x86_64", "arm64-v8a"]
}

def isNewArchitectureEnabled() {
  return rootProject.hasProperty("newArchEnabled") && rootProject.getProperty("newArchEnabled") == "true"
}

apply plugin: "com.android.library"
apply plugin: "org.jetbrains.kotlin.android"
apply from: '../nitrogen/generated/android/WhatzItLiveOverlay+autolinking.gradle'
apply from: './fix-prefab.gradle'

group = 'com.whatzit.liveoverlay'
version = '0.1.0'

if (isNewArchitectureEnabled()) {
  apply plugin: "com.facebook.react"
}

def getExtOrDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : project.properties["WhatzItLiveOverlay_" + name]
}

def getExtOrIntegerDefault(name) {
  return rootProject.ext.has(name) ? rootProject.ext.get(name) : (project.properties["WhatzItLiveOverlay_" + name]).toInteger()
}

android {
  namespace "com.whatzit.liveoverlay"

  ndkVersion getExtOrDefault("ndkVersion")
  compileSdkVersion getExtOrIntegerDefault("compileSdkVersion")

  defaultConfig {
    minSdkVersion getExtOrIntegerDefault("minSdkVersion")
    targetSdkVersion getExtOrIntegerDefault("targetSdkVersion")

    externalNativeBuild {
      cmake {
        cppFlags "-frtti -fexceptions -Wall -Wextra -fstack-protector-all"
        arguments "-DANDROID_STL=c++_shared", "-DANDROID_SUPPORT_FLEXIBLE_PAGE_SIZES=ON"
        abiFilters (*reactNativeArchitectures())

        buildTypes {
          debug { cppFlags "-O1 -g" }
          release { cppFlags "-O2" }
        }
      }
    }
  }

  externalNativeBuild {
    cmake { path "CMakeLists.txt" }
  }

  packagingOptions {
    excludes = [
      "META-INF",
      "META-INF/**",
      "**/libc++_shared.so",
      "**/libNitroModules.so",
      "**/libfbjni.so",
      "**/libjsi.so",
      "**/libfolly_json.so",
      "**/libfolly_runtime.so",
      "**/libglog.so",
      "**/libhermes.so",
      "**/libhermes-executor-debug.so",
      "**/libhermes_executor.so",
      "**/libreactnative.so",
      "**/libreactnativejni.so",
      "**/libturbomodulejsijni.so",
      "**/libreact_nativemodule_core.so",
      "**/libjscexecutor.so"
    ]
  }

  buildFeatures {
    prefab true
    prefabPublishing true
  }

  prefab {
    WhatzItLiveOverlay {
      headers "${project.buildDir}/headers/whatzitliveoverlay/"
    }
  }

  buildTypes {
    release { minifyEnabled false }
  }

  lintOptions { disable "GradleCompatible" }

  compileOptions {
    sourceCompatibility JavaVersion.VERSION_1_8
    targetCompatibility JavaVersion.VERSION_1_8
  }
}

repositories {
  mavenCentral()
  google()
}

// Match VisionCamera's CameraX workaround so ImageAnalysis APIs retain their
// real ListenableFuture implementation on this module's compile classpath.
configurations.configureEach {
  resolutionStrategy.force "com.google.guava:listenablefuture:1.0"
}

dependencies {
  implementation "com.facebook.react:react-native:+"
  implementation project(":react-native-nitro-modules")
  implementation project(":react-native-vision-camera")
  implementation "androidx.camera:camera-core:1.7.0-alpha01"
}

tasks.register('prepareHeaders', Copy) {
  from fileTree('./src/main/cpp').filter { it.isFile() }
  from fileTree('../cpp/').filter { it.isFile() }
  from fileTree('../nitrogen/generated/android/c++').filter { it.isFile() }
  from fileTree('../nitrogen/generated/shared/c++').filter { it.isFile() }
  include "*.hpp"
  into "${project.buildDir}/headers/whatzitliveoverlay/WhatzItLiveOverlay/"
  includeEmptyDirs = false
}

preBuild.dependsOn(prepareHeaders)
